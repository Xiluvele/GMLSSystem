version: '3.8'

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: glms-sql-server
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Password123"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - glms-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Password123' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  glms-backend-api:
    build:
      context: .
      dockerfile: GMLSSystem.API/Dockerfile
    container_name: glms-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:80"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db;Database=GLMSDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;"
      Jwt__Key: "GLMSSystem2026SuperSecretJWTKeyForPart3Assignment123!"
      Jwt__Issuer: "GLMSAPI"
      Jwt__Audience: "GLMSWebApp"
      Jwt__ExpiryMinutes: "60"
    ports:
      - "5000:80"
    depends_on:
      sql-server-db:
        condition: service_healthy
    networks:
      - glms-network
    restart: unless-stopped

  glms-frontend-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: glms-web
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:80"
      ApiBaseUrl: "http://glms-api:80/"
      ConnectionStrings__DefaultConnection: "Server=sql-server-db;Database=GLMSDB;User Id=sa;Password=YourStrong!Password123;TrustServerCertificate=True;"
      ExchangeRateApi__BaseUrl: "https://v6.exchangerate-api.com/v6/"
    ports:
      - "5001:80"
    depends_on:
      - glms-backend-api
    networks:
      - glms-network
    restart: unless-stopped

networks:
  glms-network:
    driver: bridge

volumes:
  sql_data:
    driver: local